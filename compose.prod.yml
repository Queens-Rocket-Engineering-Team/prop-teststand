services:
  server:
    # Pull latest image from GitHub
    image: ghcr.io/queens-rocket-engineering-team/prop-teststand-server:latest
    network_mode: "host"  # Use host networking for SSDP
    environment:
      - PROP_CONFIG=/app/config.yaml # Default config file location

    # Allow manual interaction with the container (cli)
    stdin_open: true
    tty: true

    volumes:
      - ./config.yaml:/app/config.yaml  # Mount local config file for production
      - ./recordings:/app/recordings # Mount local directory for audio recordings

    # Always restart server on dockerd start
    restart: always

  media:
    image: "bluenviron/mediamtx:latest"
    network_mode: "host"
    ports:
      - "8889:8889"
    depends_on:
      - server
    environment:
    # Use a different RTSP port to avoid conflicts with local testing
    # This port isn't being accessed externally, changing it is fine
      - MTX_RTSPADDRESS=:8558
      - MTX_API=yes

    # Always restart media on dockerd start
    restart: always
    volumes:
      - ./recordings/mediamtx:/recordings

  mumble:
    image: mumblevoip/mumble-server:latest
    ports:
      - "64738:64738"
      - "64738:64738/udp"
    volumes:
      - ./murmur.ini:/etc/mumble/murmur.ini
      - murmur-data:/data

    restart: always

volumes:
  murmur-data:

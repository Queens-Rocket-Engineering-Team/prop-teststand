name: Docker Build (Dev)

on: push

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write # Required for pushing to GHCR

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  persist-credentials: false
                  submodules: recursive

            - name: Set up uv
              uses: astral-sh/setup-uv@v5

            - name: Preload package version
              id: package-version
              run: |
                  uv sync --locked --no-dev
                  version="$(uv run --no-sync --no-dev python -c 'from libqretprop._version import __version__; print(__version__)')"
                  test -n "$version"
                  echo "version=${version}" >> "$GITHUB_OUTPUT"

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Extract Docker metadata (server)
              id: meta-server
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository }}-server
                  tags: |
                      type=raw,value=${{ github.sha }}

            - name: Build and push Docker image (server)
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./Dockerfile.server
                  platforms: linux/amd64,linux/arm64
                  push: true
                  build-args: |
                      PROP_TESTSTAND_VERSION=${{ steps.package-version.outputs.version }}
                  tags: ${{ steps.meta-server.outputs.tags }}
                  labels: ${{ steps.meta-server.outputs.labels }}
